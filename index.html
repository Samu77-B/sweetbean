<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Sweet Bean — Coming Soon</title>
    <meta
      name="description"
      content="Sweet Bean is brewing something special. We’re opening soon."
    />

    <meta property="og:title" content="Sweet Bean — Coming Soon" />
    <meta
      property="og:description"
      content="Sweet Bean is brewing something special. We’re opening soon."
    />
    <meta name="theme-color" content="#0f1a13" />

    <link
      rel="icon"
      href="sweetFavBlk.png"
      type="image/png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      href="sweetFavWht.png"
      type="image/png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="icon" href="sweetFavBlk.png" type="image/png" />

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #000;
      }

      .bg {
        position: fixed;
        inset: 0;
        background-image: url("./sweetbeaan-image.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        transform: scale(1.02);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: radial-gradient(900px 700px at 50% 40%, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.62));
      }

      .center {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .logo {
        width: min(560px, 80vw);
        height: auto;
        filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.55));
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div class="overlay" aria-hidden="true"></div>

    <main class="center" role="main" aria-label="Sweet Bean holding page">
      <img class="logo" src="./sweetbean01-Wht.png" alt="Sweet Bean logo" />
    </main>
  </body>
</html>
